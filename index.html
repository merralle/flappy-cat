<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Cat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    }
    canvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // Responsive size
  const W = 480, H = 640;
  canvas.width = W;
  canvas.height = H;

  // ─── Constants ──────────────────────────────────────────────────────────────
  const GRAVITY      = 0.45;
  const JUMP_FORCE   = -9.2;
  const PIPE_SPEED   = 2.8;
  const PIPE_WIDTH   = 72;
  const PIPE_GAP     = 230;
  const GROUND_H     = 80;
  const PIPE_SPAWN   = 105; // frames between pipes
  const CAT_W        = 68;
  const CAT_H        = 52;
  const CAT_X        = 110;

  // ─── State ───────────────────────────────────────────────────────────────────
  let state = 'start'; // start | playing | dead
  let score = 0, best = 0, frame = 0;

  const cat = { y: H / 2 - CAT_H / 2, vy: 0, rot: 0, flapAnim: 0 };
  let pipes = [];

  // ─── Trail state ─────────────────────────────────────────────────────────────
  let trailParticles = [];
  let trailHue = 0;

  // ─── Clouds ──────────────────────────────────────────────────────────────────
  const clouds = Array.from({ length: 6 }, (_, i) => ({
    x: Math.random() * W,
    y: 40 + Math.random() * 180,
    r: 22 + Math.random() * 28,
    spd: 0.25 + Math.random() * 0.3,
  }));

  // ─── Input ───────────────────────────────────────────────────────────────────
  function flap() {
    if (state === 'start')        { state = 'playing'; cat.vy = JUMP_FORCE; playMeow(); }
    else if (state === 'playing') { cat.vy = JUMP_FORCE; cat.flapAnim = 8; playMeow(); }
    else if (state === 'dead')    { restart(); }
  }
  window.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
  });
  canvas.addEventListener('pointerdown', e => { e.preventDefault(); flap(); });

  // ─── Yarn colors ─────────────────────────────────────────────────────────────
  const YARN_COLORS = [
    { base: '#e84040', dark: '#9a1a1a', light: '#ff8888' }, // red
    { base: '#4468e8', dark: '#1a3098', light: '#8899ff' }, // blue
    { base: '#a040e0', dark: '#601890', light: '#cc80ff' }, // purple
    { base: '#e87820', dark: '#9a4808', light: '#ffb060' }, // orange
    { base: '#18b0b8', dark: '#0a7080', light: '#60e0e8' }, // teal
  ];

  // ─── Helpers ─────────────────────────────────────────────────────────────────
  function restart() {
    cat.y = H / 2 - CAT_H / 2;
    cat.vy = 0; cat.rot = 0; cat.flapAnim = 0;
    pipes = []; score = 0; frame = 0;
    trailParticles = [];
    state = 'start';
  }

  function spawnPipe() {
    const minTop = 70, maxTop = H - GROUND_H - PIPE_GAP - 70;
    const topH = minTop + Math.random() * (maxTop - minTop);
    const col = YARN_COLORS[Math.floor(Math.random() * YARN_COLORS.length)];
    pipes.push({ x: W + 10, topH, scored: false, col });
  }

  function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  // ─── Drawing helpers ─────────────────────────────────────────────────────────
  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.arcTo(x + w, y, x + w, y + r, r);
    ctx.lineTo(x + w, y + h - r);
    ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
    ctx.lineTo(x + r, y + h);
    ctx.arcTo(x, y + h, x, y + h - r, r);
    ctx.lineTo(x, y + r);
    ctx.arcTo(x, y, x + r, y, r);
    ctx.closePath();
  }

  // ─── Draw background ─────────────────────────────────────────────────────────
  function drawBg() {
    // Sky
    const sky = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
    sky.addColorStop(0, '#5bc8e8');
    sky.addColorStop(1, '#c8eefd');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H - GROUND_H);

    // Clouds
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    clouds.forEach(c => {
      ctx.beginPath();
      ctx.ellipse(c.x, c.y, c.r, c.r * 0.6, 0, 0, Math.PI * 2);
      ctx.ellipse(c.x - c.r * 0.55, c.y + 4, c.r * 0.65, c.r * 0.5, 0, 0, Math.PI * 2);
      ctx.ellipse(c.x + c.r * 0.55, c.y + 4, c.r * 0.65, c.r * 0.5, 0, 0, Math.PI * 2);
      ctx.fill();
    });

    // Ground
    ctx.fillStyle = '#7dc956';
    ctx.fillRect(0, H - GROUND_H, W, 22);
    ctx.fillStyle = '#a5622d';
    ctx.fillRect(0, H - GROUND_H + 22, W, GROUND_H - 22);

    // Grass tufts
    ctx.fillStyle = '#5aad3a';
    for (let gx = 0; gx < W; gx += 14) {
      const h = 6 + Math.sin(gx * 0.7) * 3;
      ctx.beginPath();
      ctx.moveTo(gx, H - GROUND_H + 2);
      ctx.quadraticCurveTo(gx + 3, H - GROUND_H - h, gx + 6, H - GROUND_H + 2);
      ctx.fill();
    }
  }

  // ─── Draw a single yarn ball ──────────────────────────────────────────────────
  function drawYarnBall(cx, cy, r, col, seed) {
    ctx.save();

    // Drop shadow
    ctx.beginPath();
    ctx.arc(cx + 3, cy + 3, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fill();

    // Base sphere
    const grad = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.05, cx, cy, r);
    grad.addColorStop(0, col.light);
    grad.addColorStop(0.55, col.base);
    grad.addColorStop(1, col.dark);
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Clip subsequent drawing to circle
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.clip();

    // Yarn wrap strands — main set
    ctx.lineWidth = 2;
    ctx.strokeStyle = col.dark;
    for (let i = 0; i < 7; i++) {
      const a = (i / 7) * Math.PI + seed * 0.4;
      const cos = Math.cos(a), sin = Math.sin(a);
      const cp1x = cx + sin * r * 0.6, cp1y = cy - cos * r * 0.6;
      ctx.beginPath();
      ctx.moveTo(cx - cos * r, cy - sin * r);
      ctx.quadraticCurveTo(cp1x, cp1y, cx + cos * r, cy + sin * r);
      ctx.stroke();
    }
    // Cross strands — lighter
    ctx.lineWidth = 1.2;
    ctx.strokeStyle = col.light;
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * Math.PI + seed * 0.4 + 0.5;
      const cos = Math.cos(a), sin = Math.sin(a);
      const cp1x = cx - sin * r * 0.5, cp1y = cy + cos * r * 0.5;
      ctx.beginPath();
      ctx.moveTo(cx - cos * r, cy - sin * r);
      ctx.quadraticCurveTo(cp1x, cp1y, cx + cos * r, cy + sin * r);
      ctx.stroke();
    }

    // Specular highlight
    ctx.beginPath();
    ctx.arc(cx - r * 0.3, cy - r * 0.32, r * 0.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.32)';
    ctx.fill();

    ctx.restore();

    // Outline ring
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = col.dark;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // ─── Draw yarn column (top or bottom) ────────────────────────────────────────
  function drawYarnColumn(p, isTop) {
    const col = p.col;
    const cx  = p.x + PIPE_WIDTH / 2;
    const r   = PIPE_WIDTH / 2 + 2; // 38px — ball fills the column width
    const bY  = p.topH + PIPE_GAP;

    // Which column?
    const colTop  = isTop ? 0         : bY + r;
    const colBot  = isTop ? p.topH    : H - GROUND_H;
    const ballCY  = isTop ? p.topH - r : bY + r;

    if (colBot - colTop > 0) {
      // ── Body fill ──
      ctx.fillStyle = col.base;
      ctx.fillRect(p.x, colTop, PIPE_WIDTH, colBot - colTop);

      // Yarn wave lines across body
      ctx.save();
      ctx.beginPath();
      ctx.rect(p.x, colTop, PIPE_WIDTH, colBot - colTop);
      ctx.clip();

      const step = 16;
      for (let y = colTop + 8; y < colBot; y += step) {
        ctx.beginPath();
        ctx.moveTo(p.x, y);
        ctx.bezierCurveTo(
          p.x + PIPE_WIDTH * 0.3, y + 7,
          p.x + PIPE_WIDTH * 0.7, y - 7,
          p.x + PIPE_WIDTH, y
        );
        ctx.strokeStyle = col.dark;
        ctx.lineWidth = 1.6;
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(p.x, y + step / 2);
        ctx.bezierCurveTo(
          p.x + PIPE_WIDTH * 0.3, y + step / 2 - 5,
          p.x + PIPE_WIDTH * 0.7, y + step / 2 + 5,
          p.x + PIPE_WIDTH, y + step / 2
        );
        ctx.strokeStyle = col.light;
        ctx.lineWidth = 1;
        ctx.stroke();
      }
      ctx.restore();
    }

    // ── Face ball at gap edge ──
    drawYarnBall(cx, ballCY, r, col, isTop ? 0 : 1.3);
  }

  // ─── Draw pipe (now yarn balls) ───────────────────────────────────────────────
  function drawPipe(p) {
    drawYarnColumn(p, true);   // top column
    drawYarnColumn(p, false);  // bottom column
  }

  // ─── Draw cat ────────────────────────────────────────────────────────────────
  // Based on the photo: fluffy long-haired cat, mostly white with gray tabby patches,
  // bright green eyes, pink nose, long white whiskers.
  function drawCat(cx, cy, rot, flapAnim) {
    ctx.save();
    // Pivot at cat center
    ctx.translate(cx + CAT_W / 2, cy + CAT_H / 2);
    ctx.rotate(rot);

    const ox = -CAT_W / 2, oy = -CAT_H / 2; // local origin

    // ── Tail (fluffy, extends left/behind) ──
    // Base of tail
    ctx.beginPath();
    ctx.ellipse(ox - 14, oy + 32, 20, 10, -0.25, 0, Math.PI * 2);
    ctx.fillStyle = '#c0c0c0';
    ctx.fill();
    // Middle tuft
    ctx.beginPath();
    ctx.ellipse(ox - 30, oy + 28, 16, 11, -0.45, 0, Math.PI * 2);
    ctx.fillStyle = '#d5d5d5';
    ctx.fill();
    // Tail tip
    ctx.beginPath();
    ctx.ellipse(ox - 42, oy + 23, 14, 12, -0.6, 0, Math.PI * 2);
    ctx.fillStyle = '#e8e8e8';
    ctx.fill();
    // Gray markings on tail
    ctx.beginPath();
    ctx.ellipse(ox - 20, oy + 26, 8, 5, -0.4, 0, Math.PI * 2);
    ctx.fillStyle = '#a0a0a0';
    ctx.fill();

    // ── Body (white / light gray base) ──
    ctx.beginPath();
    ctx.ellipse(ox + 30, oy + 30, 28, 22, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#f2f2f2';
    ctx.fill();

    // Fluffy fur fringe around body edges
    const fringe = [
      [-0.4, 0.9], [0.15, 1.05], [0.7, 0.95], [1.1, 0.5],
      [1.1, -0.1], [0.7, -0.4], [0.1, -0.55], [-0.4, -0.3],
    ];
    fringe.forEach(([ang]) => {
      const bx = ox + 30 + Math.cos(ang) * 27;
      const by = oy + 30 + Math.sin(ang) * 21;
      ctx.beginPath();
      ctx.ellipse(bx, by, 7, 5, ang, 0, Math.PI * 2);
      ctx.fillStyle = '#ececec';
      ctx.fill();
    });

    // Gray tabby patches on back
    ctx.beginPath();
    ctx.ellipse(ox + 26, oy + 14, 18, 9, 0.2, 0, Math.PI * 2);
    ctx.fillStyle = '#a8a8a8';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(ox + 42, oy + 20, 12, 7, 0.4, 0, Math.PI * 2);
    ctx.fillStyle = '#b0b0b0';
    ctx.fill();
    // Tabby stripe hints
    ctx.strokeStyle = '#909090';
    ctx.lineWidth = 1.5;
    [[ox+18,oy+10,ox+30,oy+8],[ox+32,oy+10,ox+44,oy+8],[ox+22,oy+17,ox+36,oy+14]].forEach(([x1,y1,x2,y2])=>{
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    });

    // Fluffy chest / belly (white)
    ctx.beginPath();
    ctx.ellipse(ox + 22, oy + 35, 16, 14, 0.1, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();

    // ── Front paws ──
    // Back paw
    ctx.beginPath();
    ctx.ellipse(ox + 44, oy + 46, 10, 7, 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#f0f0f0';
    ctx.fill();
    // Front paw (slightly lower due to flap anim)
    const pawOff = flapAnim > 0 ? -3 : 2;
    ctx.beginPath();
    ctx.ellipse(ox + 32, oy + 48 + pawOff, 11, 7, 0.1, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff';
    ctx.fill();
    // Toe beans
    [ox+26,ox+31,ox+36].forEach(px => {
      ctx.beginPath();
      ctx.ellipse(px, oy + 52 + pawOff, 2.2, 2, 0, 0, Math.PI * 2);
      ctx.fillStyle = '#ffc0cb';
      ctx.fill();
    });

    // ── Head ──
    ctx.beginPath();
    ctx.ellipse(ox + 54, oy + 18, 18, 17, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#f2f2f2';
    ctx.fill();

    // Head fur fringe
    [0, 0.7, 1.4, 2.1, 2.8, 3.5, 4.2, 5.0, 5.7].forEach(a => {
      ctx.beginPath();
      ctx.ellipse(ox + 54 + Math.cos(a)*17, oy + 18 + Math.sin(a)*16, 5, 4, a, 0, Math.PI*2);
      ctx.fillStyle = '#e8e8e8';
      ctx.fill();
    });

    // Gray patch on top of head
    ctx.beginPath();
    ctx.ellipse(ox + 52, oy + 7, 13, 7, -0.1, 0, Math.PI * 2);
    ctx.fillStyle = '#a8a8a8';
    ctx.fill();
    // Subtle tabby stripe on forehead
    ctx.strokeStyle = '#909090';
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(ox+48,oy+4); ctx.lineTo(ox+57,oy+3); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox+46,oy+8); ctx.lineTo(ox+55,oy+7); ctx.stroke();

    // ── Ears ──
    // Left ear
    ctx.beginPath();
    ctx.moveTo(ox + 40, oy + 7);
    ctx.lineTo(ox + 36, oy - 8);
    ctx.lineTo(ox + 50, oy + 3);
    ctx.closePath();
    ctx.fillStyle = '#d8d8d8';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(ox + 41, oy + 5);
    ctx.lineTo(ox + 38, oy - 4);
    ctx.lineTo(ox + 48, oy + 3);
    ctx.closePath();
    ctx.fillStyle = '#ffb6c1';
    ctx.fill();

    // Right ear
    ctx.beginPath();
    ctx.moveTo(ox + 58, oy + 4);
    ctx.lineTo(ox + 59, oy - 10);
    ctx.lineTo(ox + 70, oy + 6);
    ctx.closePath();
    ctx.fillStyle = '#d8d8d8';
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(ox + 59, oy + 4);
    ctx.lineTo(ox + 60, oy - 5);
    ctx.lineTo(ox + 67, oy + 5);
    ctx.closePath();
    ctx.fillStyle = '#ffb6c1';
    ctx.fill();

    // ── Eyes (bright green!) ──
    // Left eye
    ctx.beginPath();
    ctx.ellipse(ox + 46, oy + 17, 5.5, 4.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#3dba50';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(ox + 46, oy + 17, 3, 4, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(ox + 44.5, oy + 15.5, 1.3, 1.3, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    // Right eye
    ctx.beginPath();
    ctx.ellipse(ox + 61, oy + 17, 5.5, 4.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#3dba50';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(ox + 61, oy + 17, 3, 4, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(ox + 59.5, oy + 15.5, 1.3, 1.3, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    // ── Nose (pink triangle) ──
    ctx.beginPath();
    ctx.moveTo(ox + 52, oy + 23);
    ctx.lineTo(ox + 56, oy + 21);
    ctx.lineTo(ox + 55, oy + 25);
    ctx.closePath();
    ctx.fillStyle = '#ff9eb5';
    ctx.fill();

    // Mouth
    ctx.strokeStyle = '#d08898';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(ox + 54, oy + 25);
    ctx.quadraticCurveTo(ox + 50, oy + 28, ox + 47, oy + 27);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ox + 54, oy + 25);
    ctx.quadraticCurveTo(ox + 58, oy + 28, ox + 61, oy + 27);
    ctx.stroke();

    // ── Whiskers (long and white) ──
    ctx.strokeStyle = 'rgba(255,255,255,0.9)';
    ctx.lineWidth = 0.9;
    // Left side whiskers
    [[ox+50,oy+23,ox+24,oy+21],[ox+50,oy+24,ox+24,oy+26],[ox+50,oy+23,ox+26,oy+17]].forEach(([x1,y1,x2,y2])=>{
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    });
    // Right side whiskers
    [[ox+57,oy+23,ox+80,oy+21],[ox+57,oy+24,ox+80,oy+26],[ox+57,oy+23,ox+78,oy+17]].forEach(([x1,y1,x2,y2])=>{
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    });

    ctx.restore();
  }

  // ─── Rainbow sparkle trail ───────────────────────────────────────────────────
  function spawnTrailParticles() {
    const count = 2 + Math.floor(Math.random() * 2);
    for (let i = 0; i < count; i++) {
      trailHue = (trailHue + 18) % 360;
      trailParticles.push({
        x: CAT_X + 4 + Math.random() * 18,
        y: cat.y + 8 + Math.random() * 32,
        vx: -0.6 - Math.random() * 1.8,
        vy: (Math.random() - 0.5) * 1.2,
        hue: trailHue,
        size: 3 + Math.random() * 5,
        life: 1.0,
        decay: 0.032 + Math.random() * 0.024,
        star: Math.random() < 0.45,
      });
    }
  }

  function updateTrail() {
    for (let i = trailParticles.length - 1; i >= 0; i--) {
      const p = trailParticles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) trailParticles.splice(i, 1);
    }
  }

  function drawTrail() {
    ctx.save();
    for (const p of trailParticles) {
      const alpha = p.life;
      const sz = p.size * p.life;
      ctx.shadowBlur = 0;

      // Glowing core dot
      ctx.beginPath();
      ctx.arc(p.x, p.y, sz, 0, Math.PI * 2);
      ctx.fillStyle = `hsla(${p.hue}, 100%, 78%, ${alpha})`;
      ctx.fill();

      // 4-point sparkle star on some particles
      if (p.star && alpha > 0.25) {
        ctx.strokeStyle = `hsla(${p.hue}, 100%, 95%, ${alpha * 0.75})`;
        ctx.lineWidth = 0.9;
        const outer = sz * 2.6;
        const inner = sz * 0.4;
        for (let a = 0; a < 4; a++) {
          const angle = (a / 4) * Math.PI * 2;
          ctx.beginPath();
          ctx.moveTo(p.x + Math.cos(angle) * inner, p.y + Math.sin(angle) * inner);
          ctx.lineTo(p.x + Math.cos(angle) * outer, p.y + Math.sin(angle) * outer);
          ctx.stroke();
        }
      }
    }
    ctx.restore();

  function playMeow() {
    const audio = new Audio(MEOW_SRC);
    // Slight random pitch shift so repeated meows feel natural
    audio.playbackRate = 0.88 + Math.random() * 0.26;
    audio.volume = 0.75;
    audio.play().catch(() => {});
  }


  // ─── Draw UI text with outline ────────────────────────────────────────────────
  function outlineText(text, x, y, size, fill, stroke, sw = 3) {
    ctx.font = `bold ${size}px Arial`;
    ctx.textAlign = 'center';
    ctx.lineWidth = sw;
    ctx.strokeStyle = stroke;
    ctx.strokeText(text, x, y);
    ctx.fillStyle = fill;
    ctx.fillText(text, x, y);
  }

  // ─── Screens ─────────────────────────────────────────────────────────────────
  function drawStartScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(0, 0, W, H);

    outlineText('FLAPPY CAT', W / 2, 180, 54, '#ffe066', '#7a5500', 4);
    outlineText('Tap / Space to fly!', W / 2, 240, 22, '#ffffff', '#333', 2);
    if (best > 0) {
      outlineText(`Best: ${best}`, W / 2, 280, 20, '#ffe066', '#333', 2);
    }

    // Little preview cat in center
    drawCat(W / 2 - CAT_W / 2, 310, 0, 0);
  }

  function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);

    const px = W / 2 - 155, py = H / 2 - 125, pw = 310, ph = 250;
    ctx.fillStyle = '#fff8e8';
    ctx.strokeStyle = '#8B6500';
    ctx.lineWidth = 3;
    roundRect(px, py, pw, ph, 18);
    ctx.fill();
    ctx.stroke();

    outlineText('GAME OVER', W / 2, py + 58, 40, '#cc2222', '#700000', 3);
    outlineText(`Score: ${score}`, W / 2, py + 105, 28, '#333', '#aaa', 2);
    outlineText(`Best: ${best}`, W / 2, py + 142, 24, '#d4a800', '#aaa', 2);

    // Tap to restart button
    ctx.fillStyle = '#4db050';
    roundRect(W / 2 - 90, py + 168, 180, 44, 10);
    ctx.fill();
    outlineText('Play Again', W / 2, py + 197, 22, '#fff', '#2a6a2c', 2);
  }

  // ─── Main loop ───────────────────────────────────────────────────────────────
  function update() {
    // Always scroll clouds
    clouds.forEach(c => { c.x -= c.spd; if (c.x < -80) c.x = W + 80; });

    // Trail particles fade even when not playing
    updateTrail();

    if (state !== 'playing') return;

    frame++;

    // Cat physics
    cat.vy += GRAVITY;
    cat.y  += cat.vy;
    cat.rot = Math.max(-0.45, Math.min(Math.PI * 0.38, cat.vy * 0.068));
    if (cat.flapAnim > 0) cat.flapAnim--;

    // Emit trail sparkles
    spawnTrailParticles();

    // Spawn pipes
    if (frame % PIPE_SPAWN === 0) spawnPipe();

    // Update pipes
    for (let i = pipes.length - 1; i >= 0; i--) {
      pipes[i].x -= PIPE_SPEED;

      // Score point
      if (!pipes[i].scored && pipes[i].x + PIPE_WIDTH < CAT_X) {
        pipes[i].scored = true;
        score++;
        if (score > best) best = score;
      }
      // Remove old pipes
      if (pipes[i].x + PIPE_WIDTH < -10) pipes.splice(i, 1);
    }

    // Collision: yarn ball columns
    // Ball radius extends 2px beyond PIPE_WIDTH on each side, so use p.x - 2
    const hitbox = { x: CAT_X + 8, y: cat.y + 6, w: CAT_W - 18, h: CAT_H - 10 };
    for (const p of pipes) {
      const ballR = PIPE_WIDTH / 2 + 2;
      if (
        rectsOverlap(hitbox.x, hitbox.y, hitbox.w, hitbox.h, p.x - 2, 0, PIPE_WIDTH + 4, p.topH) ||
        rectsOverlap(hitbox.x, hitbox.y, hitbox.w, hitbox.h, p.x - 2, p.topH + PIPE_GAP, PIPE_WIDTH + 4, H)
      ) {
        state = 'dead';
        return;
      }
    }

    // Collision: ceiling / floor
    if (cat.y < -10 || cat.y + CAT_H > H - GROUND_H + 5) {
      state = 'dead';
    }
  }

  function draw() {
    drawBg();
    pipes.forEach(drawPipe);
    drawTrail();
    drawCat(CAT_X, cat.y, cat.rot, cat.flapAnim);

    // Score during play
    if (state === 'playing' || state === 'dead') {
      outlineText(String(score), W / 2, 60, 48, '#ffffff', '#333', 3);
    }

    if (state === 'start') drawStartScreen();
    if (state === 'dead')  drawGameOver();
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  loop();
</script>
</body>
</html>
